name: Continuous Integration

concurrency:
   group: ci-${{ github.event.number }}
   cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: "31 1,12 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  shellcheck:
    name: Shellcheck
    uses: ./.github/workflows/shellcheck.yml

  todo:
    if: github.event_name == 'push'
    name: TODO
    uses: ./.github/workflows/todo.yml

  validate-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout RxV
        uses: actions/checkout@v3
        with:
          path: rxv

      - name: Setup V
        uses: vlang/setup-v@v1
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Copy source code to V Modules
        run: |
          mkdir -p ~/.vmodules/ulises_jeremias
          cp -rf ./rxv ~/.vmodules/ulises_jeremias/rxv

      - name: Validate Docs
        run: |
          cd ./rxv
          v check-md .

  fmt-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout RxV
        uses: actions/checkout@v3
        with:
          path: rxv

      - name: Setup V
        uses: vlang/setup-v@v1
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Move source code to V Modules
        run: |
          mkdir -p ~/.vmodules/ulises_jeremias
          mv ./rxv ~/.vmodules/ulises_jeremias/rxv

      - name: Verify Fmt
        run: |
          v fmt -verify ~/.vmodules/ulises_jeremias/rxv

  run-tests:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-20.04
        flags:
          - ""
          # TODO: Add --prod flag once the new release is ready
          # - "--prod"

    steps:
      - name: Checkout RxV
        uses: actions/checkout@v3
        with:
          path: rxv

      - name: Setup V
        uses: vlang/setup-v@v1
        with:
          check-latest: true

      - name: V doctor
        run: v doctor

      - name: Move RxV source code to V Modules
        run: |
          mkdir -p ~/.vmodules/ulises_jeremias
          mv ./rxv ~/.vmodules/ulises_jeremias/rxv

      - name: Execute Tests using Pure V Backend
        run: ~/.vmodules/ulises_jeremias/rxv/bin/test ${{ matrix.flags }}

      - name: Execute Tests using Pure V Backend and Garbage Collection enabled
        run: ~/.vmodules/ulises_jeremias/rxv/bin/test ${{ matrix.flags }} --use-gc boehm
